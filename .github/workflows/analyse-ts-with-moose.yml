name: TypeScript Analysis with Moose

on:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Permission d'écriture nécessaire pour pousser sur la branche ci-results
    permissions:
      contents: write
    
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # Facultatif - ne pas faire pour Emojiopoly - il n'y a pas de tests
      # - name: Installer les dépendances npm
      #   run: npm ci

      # - name: Exécuter les tests Jest
      #   run: npm test

      - name: Installer ts2famix
        run: npm install -g ts2famix

      - name: Générer le modèle Famix (JSON)
        run: |
          ts2famix -i tsconfig.json -o model.json
          echo "Modèle généré : $(wc -c < model.json) octets"
          # Vérification rapide que le JSON est valide
          python3 -c "import json; json.load(open('model.json')); print('JSON valide')"

      # Install Pharo/Moose
      - name: Installer smalltalkCI (image Moose)
        uses: hpi-swa/setup-smalltalkCI@v1
        id: smalltalkci
        with:
          # Moose64-12 = Moose sur Pharo 12, compatible avec FamixTypeScript
          smalltalk-image: Moose64-12

      # Load FamixTypeScript metamodel and run analysis
      - name: Charger FamixTypeScript et exporter les métriques CSV
        run: |
          # the .ston file loads the metamodel and runs a script to do analysis (see .ston file fore more info)
          smalltalkci -s ${{ steps.smalltalkci.outputs.smalltalk-image }} .github/moose-analysis.ston
        shell: bash
        timeout-minutes: 20

      - name: Push metrics to ci-metrics branch
        run: |
          # Fetch remote branches to ensure we have the latest info
          git fetch origin
          # Temporarily move the metrics file to avoid checkout conflicts
          cp export_metrics.md /tmp/export_metrics.md
          cp model.json /tmp/model.json
          rm export_metrics.md
          rm model.json
          # Configure git for commits
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Checkout ci-metrics branch: try from remote if exists, otherwise create new
          git checkout -b ci-metrics origin/ci-metrics 2>/dev/null || git checkout -b ci-metrics
          # Restore the metrics file to the branch
          cp /tmp/export_metrics.md export_metrics.md
          cp /tmp/model.json model.json
          # Stage and commit the metrics file
          git add export_metrics.md model.json
          git commit -m "Update metrics from TypeScript analysis" || echo "No changes to commit"
          # Push the branch (creates it remotely if new)
          git push origin ci-metrics
